experiment:
  id: exp006_reliability_cache_full
  name: Full PSF-aware reliability input-target cache

inputs:
  split_csv: data/manifests/fastmri_brain_multicoil_axt2_splits.csv
  mask_indices_json: data/processed/fourway_masks/fourway_mask_indices.json
  checkpoint: results/exp004_train_ssdu_v4_full/best_model.pt

data:
  splits:
    - train
    - calibration
    - test
  max_volumes_per_split:
    train: null
    calibration: null
    test: null
  max_slices_per_volume: null

reconstruction:
  body_mask_threshold: 0.03
  body_mask_softness: 0.02

normalization:
  reference_percentile: 99.0
  epsilon: 1.0e-8

model:
  features: 16
  init_step_size: 0.1

residual_target:
  patch_size: 16
  dcf_kernel_size: 9
  psf_num_probes: 4
  psf_seed: 20260529
  normalize_percentile: 99.0
  log_alpha: 10.0

support_mask:
  source: x0_rss
  threshold: 0.05
  softness: 0.02
  smooth_kernel_size: 15
  percentile: 99.0
  power: 1.0

cache:
  dtype: float16

outputs:
  output_dir: "${FOURWAY_PROJECT_ROOT}/outputs/exp006_reliability_cache_full"
  cache_dir: "${FOURWAY_PROJECT_ROOT}/outputs/exp006_reliability_cache_full/cache"
